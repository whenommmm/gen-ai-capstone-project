# Render Blueprint — deploys the FastAPI backend.
# Use via: render.com -> New -> Blueprint -> pick this repo.
# (Or skip the blueprint and create a Web Service manually with the same settings.)
services:
  - type: web
    name: recruitment-api
    runtime: python
    rootDir: recruitment-platform
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this secret in the Render dashboard — never commit it
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: "3.13"
